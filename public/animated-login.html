<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoopKart - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #e8dccb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        .blob1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #8B6B47 0%, #a67c52 100%);
            top: -100px;
            left: -100px;
            animation: float1 8s infinite;
        }

        .blob2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #d4a574 0%, #8B6B47 100%);
            bottom: -80px;
            right: -80px;
            animation: float2 10s infinite;
        }

        .blob3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #c9a87c 0%, #8B6B47 100%);
            top: 50%;
            left: 10%;
            animation: float3 12s infinite;
        }

        .blob4 {
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #8B6B47 0%, #6d5438 100%);
            top: 20%;
            right: 15%;
            animation: float4 9s infinite;
        }

        .blob5 {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, #b8956a 0%, #8B6B47 100%);
            bottom: 30%;
            left: 50%;
            animation: float5 11s infinite;
        }

        @keyframes float1 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, 80px) scale(1.1);
            }
        }

        @keyframes float2 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-60px, -70px) scale(1.15);
            }
        }

        @keyframes float3 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(70px, -50px) scale(0.95);
            }
        }

        @keyframes float4 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-40px, 60px) scale(1.08);
            }
        }

        @keyframes float5 {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, -40px) scale(1.12);
            }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(139, 107, 71, 0.2);
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #8B6B47;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 0.95rem;
            color: #6d5438;
            font-weight: 500;
        }

        /* Heading */
        .heading {
            text-align: center;
            margin-bottom: 2rem;
        }

        .heading h2 {
            font-size: 1.75rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .heading p {
            font-size: 0.9rem;
            color: #666;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8B6B47;
            font-size: 1.1rem;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid rgba(139, 107, 71, 0.2);
            border-radius: 10px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            color: #333;
        }

        input::placeholder {
            color: #999;
        }

        input:focus {
            outline: none;
            border-color: #8B6B47;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(139, 107, 71, 0.1);
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8B6B47;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: #6d5438;
            transform: translateY(-50%) scale(1.1);
        }

        /* Forgot Password */
        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: #8B6B47;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            color: #6d5438;
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B6B47 0%, #6d5438 100%);
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px rgba(139, 107, 71, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 107, 71, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-google {
            background: white;
            color: #333;
            border: 2px solid rgba(139, 107, 71, 0.2);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: #8B6B47;
            transform: translateY(-2px);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #666;
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(139, 107, 71, 0.2);
        }

        .divider span {
            padding: 0 1rem;
        }

        /* Sign Up Link */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .signup-link a {
            color: #8B6B47;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #6d5438;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.75rem;
            }

            .heading h2 {
                font-size: 1.5rem;
            }

            .blob {
                filter: blur(40px);
            }
        }

        /* Loading Animation */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-primary.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo">
                <h1>🛒 LoopKart</h1>
                <p>Premium Shopping Experience</p>
            </div>

            <!-- Heading -->
            <div class="heading">
                <h2>Welcome Back</h2>
                <p>Sign in to continue shopping</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <!-- Email Input -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="Email address"
                            required
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Password"
                            required
                        >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="togglePassword"
                            aria-label="Toggle password visibility"
                        >
                            👁️
                        </button>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="forgot-password">
                    <a href="#" id="forgotPassword">Forgot password?</a>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="btn btn-primary" id="signInBtn">
                    Sign In
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Google Sign In -->
                <button type="button" class="btn btn-google" id="googleBtn">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="signup-link">
                Don't have an account? <a href="#" id="createAccount">Create account</a>
            </div>
        </div>
    </div>

    <script>
        // Password Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        let isPasswordVisible = false;

        togglePassword.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            togglePassword.textContent = isPasswordVisible ? '🙈' : '👁️';
        });

        // Form Submit
        const loginForm = document.getElementById('loginForm');
        const signInBtn = document.getElementById('signInBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Add loading state
            signInBtn.classList.add('loading');
            signInBtn.textContent = 'Signing in...';

            // Simulate API call
            setTimeout(() => {
                signInBtn.classList.remove('loading');
                signInBtn.textContent = 'Sign In';
                
                alert(`Login successful!\nEmail: ${email}\n\nNote: This is a frontend-only demo. No actual authentication is performed.`);
                
                // Reset form
                loginForm.reset();
            }, 2000);
        });

        // Google Sign In
        const googleBtn = document.getElementById('googleBtn');
        googleBtn.addEventListener('click', () => {
            alert('Google Sign In clicked!\n\nNote: This is a UI-only demo. Google OAuth integration requires backend setup.');
        });

        // Forgot Password
        const forgotPassword = document.getElementById('forgotPassword');
        forgotPassword.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Forgot Password clicked!\n\nNote: This is a frontend-only demo.');
        });

        // Create Account
        const createAccount = document.getElementById('createAccount');
        createAccount.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Create Account clicked!\n\nNote: This is a frontend-only demo.');
        });

        // Input Focus Animation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
